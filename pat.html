<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
  }
  #pat {
    position: fixed;
    image-rendering: auto;
    pointer-events: none;
    user-select: none;
    transform-origin: center center;
  }
</style>
</head>
<body>
  <img id="pat" src="petpet-transparent.gif" alt="">
  <script>
    // Query params:
    //   x, y      : top-left position in px (default 0, 0)
    //   size      : width in px (height auto) (default 200)
    //   rotate    : degrees (default 0)
    //   flip      : 1 to mirror horizontally
    //   src       : override gif URL (default petpet-transparent.gif)
    const q = new URLSearchParams(location.search);
    const num = (k, d) => {
      const v = parseFloat(q.get(k));
      return Number.isFinite(v) ? v : d;
    };
    const x = num("x", 0);
    const y = num("y", 0);
    const size = num("size", 200);
    const rotate = num("rotate", 0);
    const flip = q.get("flip") === "1" ? -1 : 1;
    const src = q.get("src");

    const img = document.getElementById("pat");
    if (src) img.src = src;
    img.style.left = x + "px";
    img.style.top = y + "px";
    img.style.width = size + "px";
    img.style.height = "auto";
    img.style.transform = `rotate(${rotate}deg) scaleX(${flip})`;
  </script>
</body>
</html>
